<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔지니어 학습 코치 Agent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧑‍💻</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-emoji">🧑‍💻</span>
      <div>
        <h1>엔지니어 학습 코치</h1>
        <p>Engineer Learning Coach Agent</p>
      </div>
    </div>

    <nav class="modes">
      <button class="mode-btn active" data-mode="algo">
        <span class="mode-icon">🧩</span>
        <span>알고리즘 문제 풀이</span>
      </button>
      <button class="mode-btn" data-mode="concept">
        <span class="mode-icon">📘</span>
        <span>CS 개념 설명</span>
      </button>
      <button class="mode-btn" data-mode="review">
        <span class="mode-icon">🔍</span>
        <span>코드 리뷰</span>
      </button>
    </nav>

    <div class="sidebar-section">
      <label class="section-label">힌트 강도 (알고리즘 모드)</label>
      <div class="hint-levels" id="hintLevels">
        <button data-level="1" class="hint-btn active">살짝 힌트</button>
        <button data-level="2" class="hint-btn">방향 제시</button>
        <button data-level="3" class="hint-btn">정답까지</button>
      </div>
    </div>

    <div class="sidebar-section">
      <label class="section-label">난이도</label>
      <select id="levelSelect">
        <option value="beginner">초급 (입문)</option>
        <option value="intermediate" selected>중급</option>
        <option value="advanced">고급</option>
      </select>
    </div>

    <button class="new-chat-btn" id="newChatBtn">+ 새 대화 시작</button>

    <div class="sidebar-footer">
      <button class="settings-btn" id="settingsBtn">⚙️ API 설정</button>
      <div class="status" id="statusBadge">키 미설정</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-title" id="topbarTitle">🧩 알고리즘 문제 풀이 도우미</div>
      <div class="topbar-sub" id="topbarSub">문제를 붙여넣으면 단계적으로 힌트를 드려요. 정답을 바로 알려주지 않고 스스로 생각하는 과정을 돕습니다.</div>
    </header>

    <section class="chat" id="chat">
      <div class="empty-state" id="emptyState">
        <div class="empty-emoji">💡</div>
        <h2>무엇을 도와드릴까요?</h2>
        <p>왼쪽에서 모드를 선택하고, 문제·질문·코드를 입력해 보세요.</p>
        <div class="examples" id="examples"></div>
      </div>
    </section>

    <form class="composer" id="composerForm">
      <div class="composer-extra" id="composerExtra"></div>
      <div class="composer-row">
        <textarea id="userInput" placeholder="질문, 문제, 코드를 입력하세요... (Shift+Enter 줄바꿈)" rows="2"></textarea>
        <button type="submit" id="sendBtn" class="send-btn">보내기</button>
      </div>
    </form>
  </main>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙️ API 설정</h2>
    <p class="modal-desc">API 키는 <b>브라우저에만 저장</b>되며 서버로 전송되지 않습니다. 본인 계정의 API 키를 입력해 주세요.</p>

    <label class="field-label">AI Provider</label>
    <select id="providerSelect">
      <option value="anthropic">Anthropic Claude</option>
      <option value="openai">OpenAI</option>
    </select>

    <label class="field-label">모델</label>
    <select id="modelSelect"></select>

    <label class="field-label">API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-... 또는 sk-ant-...">

    <div class="modal-links">
      <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Anthropic 키 발급</a>
      <span>·</span>
      <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">OpenAI 키 발급</a>
    </div>

    <div class="modal-actions">
      <button type="button" id="saveKeyBtn" class="primary-btn">저장</button>
      <button type="button" id="closeModalBtn" class="ghost-btn">닫기</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
